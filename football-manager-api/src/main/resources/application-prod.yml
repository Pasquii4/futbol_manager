# Production profile: PostgreSQL database
# To use: mvn spring-boot:run -Dspring-boot.run.profiles=prod
#
# Prerequisites:
#   1. Install PostgreSQL 15+
#   2. Create database and user:
#      CREATE DATABASE laliga_manager;
#      CREATE USER laliga_user WITH PASSWORD 'your_password';
#      GRANT ALL PRIVILEGES ON DATABASE laliga_manager TO laliga_user;
#   3. Run migration scripts:
#      psql -U laliga_user -d laliga_manager -f db/migration/V1__initial_schema.sql
#      psql -U laliga_user -d laliga_manager -f V2__seed_laliga.sql

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/laliga_manager
    username: laliga_user
    password: your_password_here
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate  # In prod, schema managed by migration scripts
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  # Flyway migration (uncomment when ready)
  # flyway:
  #   enabled: true
  #   locations: classpath:db/migration
  #   baseline-on-migrate: true
