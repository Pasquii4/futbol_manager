# Development profile: H2 file-based database
spring:
  datasource:
    url: jdbc:h2:file:./data/football_manager;AUTO_SERVER=TRUE
    username: sa
    password: password
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: false

  # H2 Console (accessible at /h2-console)
  h2:
    console:
      enabled: true
      path: /h2-console
